set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
set-option -g status-position top
set -s escape-time 0
set -g history-limit 30000

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind r source-file ~/.tmux.conf
set -g base-index 1

# empty right status; flash PREFIX only while prefix armed
set -g status-right "#{?client_prefix,#[reverse] PREFIX #[noreverse],}"

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# fuzzy jump to any window across all sessions (replaces choose-tree)
bind w display-popup -E -w 70% -h 60% \
  "tmux list-windows -a -F '#{session_name}:#{window_index} #S › #W · #{pane_current_command}' | \
   fzf --reverse --with-nth 2.. | cut -d' ' -f1 | xargs -r tmux switch-client -t"

bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
